name: Bug report
description: Report a bug in the resume CLI
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
        Please include enough detail for deterministic reproduction.

  - type: input
    id: version
    attributes:
      label: resume version
      description: Output of `resume --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.3 / Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Include full command (redact sensitive paths/data if needed).
      render: shell
      placeholder: |
        resume --from codex --to claude --id <thread_id>
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste stderr/stdout, redacting sensitive values.
      render: text
